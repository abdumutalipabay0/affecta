<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affecta — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --surface:   #111111;
      --border:    rgba(255,255,255,.08);
      --border-hi: rgba(255,255,255,.18);
      --text:      #f0f0f0;
      --muted:     #888;
      --accent:    #3b6bff;
      --accent-h:  #5a84ff;
      --danger:    #ff4f4f;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* ambient blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: .18;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #3b6bff 0%, transparent 70%);
      top: -200px; left: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      bottom: -150px; right: -100px;
    }

    /* ── card ── */
    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 64px rgba(0,0,0,.5);
    }

    /* ── logo ── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #3b6bff 0%, #7c3aed 100%);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; letter-spacing: -1px; color: #fff;
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 22px; font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, #fff 30%, #aaa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── headings ── */
    .card-title {
      font-size: 26px; font-weight: 700;
      letter-spacing: -.5px; text-align: center;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 14px; color: var(--muted);
      text-align: center; margin-bottom: 28px;
    }

    /* ── google btn ── */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px;
      background: #fff;
      color: #1a1a1a;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background .18s, box-shadow .18s, transform .12s;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .btn-google:hover  { background: #f2f2f2; box-shadow: 0 4px 16px rgba(0,0,0,.35); transform: translateY(-1px); }
    .btn-google:active { transform: translateY(0); }
    .btn-google svg    { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── form ── */
    .form-group { margin-bottom: 14px; }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: #ccc; margin-bottom: 6px;
    }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .18s, background .18s;
    }
    input:focus {
      border-color: var(--accent);
      background: rgba(59,107,255,.08);
    }
    input::placeholder { color: #555; }

    /* ── name row (signup only) ── */
    .name-row { display: flex; gap: 10px; }
    .name-row .form-group { flex: 1; }

    /* ── primary btn ── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 13px 20px;
      background: var(--accent);
      color: #fff;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: background .18s, transform .12s, box-shadow .18s;
      box-shadow: 0 4px 20px rgba(59,107,255,.35);
      margin-top: 6px;
    }
    .btn-primary:hover  { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 6px 28px rgba(59,107,255,.5); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── spinner inside btn ── */
    .spinner {
      display: none;
      width: 18px; height: 18px; margin-right: 8px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── toggle link ── */
    .toggle-line {
      text-align: center; margin-top: 20px;
      font-size: 13.5px; color: var(--muted);
    }
    .toggle-link {
      color: var(--accent-h); font-weight: 600; cursor: pointer;
      text-decoration: none; margin-left: 4px;
    }
    .toggle-link:hover { text-decoration: underline; }

    /* ── error banner ── */
    .error-banner {
      display: none;
      align-items: center; gap: 10px;
      background: rgba(255,79,79,.1);
      border: 1px solid rgba(255,79,79,.3);
      border-radius: 10px;
      padding: 10px 14px; margin-bottom: 16px;
      font-size: 13px; color: #ff7070;
    }
    .error-banner.show { display: flex; }
    .error-banner svg { flex-shrink: 0; }

    /* ── panels ── */
    #panel-signup { display: none; }

    /* ── forgot ── */
    .forgot {
      float: right; font-size: 12px; color: var(--muted);
      text-decoration: none; font-weight: 500; margin-top: -2px;
    }
    .forgot:hover { color: var(--accent-h); }
  </style>
</head>
<body>

<div class="card">

  <!-- logo -->
  <div class="logo">
    <div class="logo-mark">A</div>
    <span class="logo-name">Affecta</span>
  </div>

  <!-- error banner (shared) -->
  <div class="error-banner" id="errorBanner">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="7" stroke="#ff7070" stroke-width="1.5"/>
      <path d="M8 4.5v4M8 10.5v1" stroke="#ff7070" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="errorText"></span>
  </div>

  <!-- ── SIGN IN panel ── -->
  <div id="panel-signin">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to continue your progress</div>

    <button class="btn-google" id="btnGoogle" onclick="signInGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="signinForm" onsubmit="submitSignin(event)">
      <div class="form-group">
        <label for="siEmail">Email</label>
        <input type="email" id="siEmail" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="siPassword">
          Password
          <a href="#" class="forgot" onclick="forgotPassword(event)">Forgot?</a>
        </label>
        <input type="password" id="siPassword" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-primary" id="btnSignin">
        <span class="spinner" id="siSpinner"></span>
        Sign in
      </button>
    </form>

    <div class="toggle-line">
      Don't have an account?
      <a class="toggle-link" onclick="showPanel('signup')">Sign up</a>
    </div>
  </div>

  <!-- ── SIGN UP panel ── -->
  <div id="panel-signup">
    <div class="card-title">Create account</div>
    <div class="card-sub">Start tracking your communication growth</div>

    <button class="btn-google" onclick="signInGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <form id="signupForm" onsubmit="submitSignup(event)">
      <div class="name-row">
        <div class="form-group">
          <label for="suFirst">First name</label>
          <input type="text" id="suFirst" placeholder="Alex" required autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label for="suLast">Last name</label>
          <input type="text" id="suLast" placeholder="Kim" autocomplete="family-name" />
        </div>
      </div>
      <div class="form-group">
        <label for="suEmail">Email</label>
        <input type="email" id="suEmail" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="suPassword">Password</label>
        <input type="password" id="suPassword" placeholder="8+ characters" required autocomplete="new-password" minlength="8" />
      </div>
      <button type="submit" class="btn-primary" id="btnSignup">
        <span class="spinner" id="suSpinner"></span>
        Create account
      </button>
    </form>

    <div class="toggle-line">
      Already have an account?
      <a class="toggle-link" onclick="showPanel('signin')">Sign in</a>
    </div>
  </div>

</div><!-- /card -->

<script>
  // ── panel toggle ──────────────────────────────────────────────
  function showPanel(which) {
    document.getElementById('panel-signin').style.display = which === 'signin' ? 'block' : 'none';
    document.getElementById('panel-signup').style.display = which === 'signup' ? 'block' : 'none';
    hideError();
  }

  // ── error helpers ─────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('errorBanner');
    document.getElementById('errorText').textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorBanner').classList.remove('show');
  }

  // ── loading state ─────────────────────────────────────────────
  function setLoading(btnId, spinnerId, loading) {
    const btn = document.getElementById(btnId);
    const sp  = document.getElementById(spinnerId);
    btn.disabled = loading;
    sp.style.display = loading ? 'inline-block' : 'none';
  }

  // ── Google OAuth ──────────────────────────────────────────────
  function signInGoogle() {
    hideError();
    window.location.href = '/auth/google';
  }

  // ── Sign In ───────────────────────────────────────────────────
  async function submitSignin(e) {
    e.preventDefault();
    hideError();
    const email    = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;

    setLoading('btnSignin', 'siSpinner', true);
    try {
      const res  = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || 'Sign in failed');
      window.location.href = '/coach';
    } catch (err) {
      showError(err.message);
      setLoading('btnSignin', 'siSpinner', false);
    }
  }

  // ── Sign Up ───────────────────────────────────────────────────
  async function submitSignup(e) {
    e.preventDefault();
    hideError();
    const firstName = document.getElementById('suFirst').value.trim();
    const lastName  = document.getElementById('suLast').value.trim();
    const email     = document.getElementById('suEmail').value.trim();
    const password  = document.getElementById('suPassword').value;

    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    setLoading('btnSignup', 'suSpinner', true);
    try {
      const res  = await fetch('/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, name: `${firstName} ${lastName}`.trim() })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || 'Sign up failed');
      // Show confirmation or redirect
      if (data.confirm_email) {
        showConfirmMessage(email);
      } else {
        window.location.href = '/coach';
      }
    } catch (err) {
      showError(err.message);
      setLoading('btnSignup', 'suSpinner', false);
    }
  }

  function showConfirmMessage(email) {
    const card = document.querySelector('.card');
    card.innerHTML = `
      <div class="logo">
        <div class="logo-mark">A</div>
        <span class="logo-name">Affecta</span>
      </div>
      <div style="text-align:center;padding:20px 0 10px">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none" style="margin-bottom:18px">
          <circle cx="28" cy="28" r="28" fill="rgba(59,107,255,.12)"/>
          <path d="M16 28l8 8 16-16" stroke="#3b6bff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="card-title" style="margin-bottom:10px">Check your inbox</div>
        <div class="card-sub" style="margin-bottom:0">
          We sent a confirmation link to<br>
          <strong style="color:#ccc">${email}</strong>.<br><br>
          Click the link to activate your account.
        </div>
      </div>
      <div class="toggle-line" style="margin-top:28px">
        Back to <a class="toggle-link" href="/auth">Sign in</a>
      </div>
    `;
  }

  // ── Forgot password ───────────────────────────────────────────
  function forgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('siEmail').value.trim();
    if (!email) { showError('Enter your email first, then click Forgot.'); return; }
    fetch('/auth/forgot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    }).then(() => {
      showError('If that email exists, a reset link has been sent.');
      document.getElementById('errorBanner').style.borderColor = 'rgba(59,107,255,.4)';
      document.getElementById('errorBanner').style.background  = 'rgba(59,107,255,.08)';
      document.getElementById('errorBanner').style.color       = '#7a9fff';
    });
  }

  // ── redirect if already logged in (check on load) ─────────────
  // (server already handles this via require_auth redirect, but
  //  we also prevent the flash of the auth page)
</script>
</body>
</html>
